<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}NRB Merchant Report Generator{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0D1F3C;
    --navy-mid: #1B3A6B;
    --navy-light: #2A5298;
    --gold: #C8972B;
    --gold-light: #F0C050;
    --cream: #F8F5EF;
    --surface: #FFFFFF;
    --border: #E2E8F4;
    --text: #1A202C;
    --text-muted: #64748B;
    --success: #16A34A;
    --warning: #D97706;
    --danger: #DC2626;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(13,31,60,0.10);
    --shadow-lg: 0 12px 40px rgba(13,31,60,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Nav */
  .nav {
    background: var(--navy);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  }
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }
  .nav-logo {
    width: 36px; height: 36px;
    background: var(--gold);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .nav-title {
    color: white;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.01em;
  }
  .nav-sub {
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    font-weight: 400;
    display: block;
  }
  .nav-links { display: flex; gap: 6px; }
  .nav-link {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .nav-link:hover { background: rgba(255,255,255,0.12); color: white; }
  .nav-link.active { background: var(--gold); color: var(--navy); }

  /* Layout */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 32px;
  }
  .card-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .card-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .card-title { font-size: 20px; font-weight: 700; color: var(--navy); }
  .card-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 22px;
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.18s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
    color: white;
    box-shadow: 0 2px 12px rgba(27,58,107,0.30);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(27,58,107,0.45); }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--navy);
    box-shadow: 0 2px 12px rgba(200,151,43,0.30);
  }
  .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(200,151,43,0.45); }
  .btn-success {
    background: linear-gradient(135deg, #16A34A, #22C55E);
    color: white;
    box-shadow: 0 2px 12px rgba(22,163,74,0.30);
  }
  .btn-success:hover { transform: translateY(-1px); }
  .btn-outline {
    background: transparent;
    color: var(--navy-mid);
    border: 1.5px solid var(--navy-mid);
  }
  .btn-outline:hover { background: var(--navy-mid); color: white; }
  .btn-lg { padding: 14px 32px; font-size: 16px; border-radius: 11px; }
  .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 7px; }

  /* Forms */
  .form-group { margin-bottom: 22px; }
  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 7px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .form-control {
    width: 100%;
    padding: 11px 16px;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--cream);
    transition: all 0.18s;
    outline: none;
  }
  .form-control:focus { border-color: var(--navy-light); background: white; box-shadow: 0 0 0 3px rgba(42,82,152,0.12); }

  /* File drop zone */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 36px 24px;
    text-align: center;
    transition: all 0.2s;
    cursor: pointer;
    background: var(--cream);
    position: relative;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--navy-light);
    background: rgba(42,82,152,0.04);
  }
  .dropzone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .dropzone-icon { font-size: 36px; margin-bottom: 10px; }
  .dropzone-text { font-size: 15px; font-weight: 600; color: var(--navy); }
  .dropzone-hint { font-size: 12px; color: var(--text-muted); margin-top: 5px; }
  .dropzone-filename { margin-top: 10px; font-size: 13px; color: var(--success); font-weight: 600; display: none; }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .badge-success { background: #DCFCE7; color: #15803D; }
  .badge-warning { background: #FEF9C3; color: #854D0E; }
  .badge-danger { background: #FEE2E2; color: #B91C1C; }
  .badge-info { background: #DBEAFE; color: #1D4ED8; }
  .badge-neutral { background: var(--border); color: var(--text-muted); }

  /* Stats row */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    text-align: center;
  }
  .stat-value { font-size: 26px; font-weight: 700; color: var(--navy); font-variant-numeric: tabular-nums; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* Progress */
  .stepper {
    display: flex; align-items: center; gap: 0;
    margin-bottom: 40px;
  }
  .step {
    display: flex; flex-direction: column; align-items: center; flex: 1;
    position: relative;
  }
  .step:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 18px; left: 60%; width: 80%; height: 2px;
    background: var(--border);
    z-index: 0;
  }
  .step.done:not(:last-child)::after { background: var(--success); }
  .step.active:not(:last-child)::after { background: var(--border); }
  .step-circle {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    border: 2px solid var(--border);
    background: white;
    color: var(--text-muted);
    z-index: 1;
    position: relative;
  }
  .step.done .step-circle { background: var(--success); border-color: var(--success); color: white; }
  .step.active .step-circle { background: var(--navy-mid); border-color: var(--navy-mid); color: white; }
  .step-label { font-size: 11px; color: var(--text-muted); margin-top: 6px; text-align: center; }
  .step.done .step-label, .step.active .step-label { color: var(--navy); font-weight: 600; }

  /* Alert */
  .alert {
    padding: 14px 18px; border-radius: 10px;
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 24px;
    font-size: 14px;
  }
  .alert-warning { background: #FFFBEB; border: 1px solid #FDE68A; color: #92400E; }
  .alert-success { background: #F0FDF4; border: 1px solid #BBF7D0; color: #166534; }
  .alert-danger { background: #FFF1F2; border: 1px solid #FECDD3; color: #9F1239; }
  .alert-info { background: #EFF6FF; border: 1px solid #BFDBFE; color: #1E40AF; }
  .alert-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

  /* Table */
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th {
    background: var(--navy); color: white;
    padding: 10px 14px; text-align: left;
    font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .data-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .data-table tr:hover td { background: rgba(42,82,152,0.03); }
  .data-table tr:last-child td { border-bottom: none; }

  /* Grid 2 col */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

  /* Section header */
  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

  /* Action bar */
  .action-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-top: 24px;
  }

  /* Hero banner */
  .hero {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    border-radius: 16px;
    padding: 48px 40px;
    color: white;
    margin-bottom: 36px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%; right: -10%;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(200,151,43,0.15) 0%, transparent 70%);
  }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(200,151,43,0.2);
    border: 1px solid rgba(200,151,43,0.4);
    color: var(--gold-light);
    padding: 4px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .hero h1 { font-size: 36px; font-weight: 700; line-height: 1.2; margin-bottom: 12px; }
  .hero p { opacity: 0.75; font-size: 16px; max-width: 520px; }

  @media (max-width: 768px) {
    .grid-2 { grid-template-columns: 1fr; }
    .hero h1 { font-size: 26px; }
    .nav { padding: 0 16px; }
    .container { padding: 24px 16px; }
  }
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-brand">
    <div class="nav-logo">🏦</div>
    <div>
      <span class="nav-title">MerchantReport</span>
      <span class="nav-sub">NRB Transaction Analytics</span>
    </div>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link {% block nav_home %}{% endblock %}">Dashboard</a>
    <a href="/upload/" class="nav-link {% block nav_upload %}{% endblock %}">New Report</a>
  </div>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
<script>
document.querySelectorAll('.dropzone input[type=file]').forEach(input => {
  const zone = input.closest('.dropzone');
  const fn = zone.querySelector('.dropzone-filename');
  input.addEventListener('change', () => {
    if(input.files[0]) {
      fn.textContent = '✓ ' + input.files[0].name;
      fn.style.display = 'block';
      zone.style.borderColor = 'var(--success)';
      zone.style.background = 'rgba(22,163,74,0.04)';
    }
  });
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    if(e.dataTransfer.files[0]) {
      input.files = e.dataTransfer.files;
      fn.textContent = '✓ ' + e.dataTransfer.files[0].name;
      fn.style.display = 'block';
    }
  });
});
</script>
</body>
</html>
